name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Backend — Lint, Build, Test ────────────────────────────────────────────
  backend:
    name: Backend — Lint, Build, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./geotrade-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: geotrade-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true  # non-blocking for now

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm test

  # ── ML Service — Install & Smoke Test ─────────────────────────────────────
  ml-service:
    name: ML Service — Install & Smoke Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ml_service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ml_service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Smoke test — import app module
        run: python -c "import importlib.util, sys; spec = importlib.util.spec_from_file_location('app', 'app.py'); mod = importlib.util.module_from_spec(spec); print('ML service import OK')"

  # ── Docker — Build Images (main only) ──────────────────────────────────────
  docker:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend, ml-service]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t geotrade-backend:ci ./geotrade-backend

      - name: Build ml_service image
        run: docker build -t geotrade-ml:ci ./ml_service
